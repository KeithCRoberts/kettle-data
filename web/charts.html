<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kettle · Charts</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg:       #111213;
  --bg2:      #161718;
  --bg3:      #1c1d1f;
  --line:     #252628;
  --line2:    rgba(37,38,40,0.6);
  --text:     #e8e9ea;
  --muted:    #7c7f87;
  --dim:      #4a4d54;
  --green:    #22c55e;
  --red:      #ef4444;
  --blue:     #3b82f6;
  --gold:     #f59e0b;
}

*{ box-sizing:border-box; margin:0; padding:0; }

body{
  background:var(--bg); color:var(--text);
  font-family:'Inter Tight',sans-serif;
  font-size:16px; min-height:100vh; overflow-x:hidden;
}

/* ── TICKER ── */
.ticker-wrap{
  background: linear-gradient(90deg,var(--blue) 0%,#6366f1 40%,#8b5cf6 70%,#a855f7 100%);
  overflow:hidden; height:26px; display:flex; align-items:center;
  position:sticky; top:0; z-index:20;
}
.ticker-track{
  display:flex;
  animation:scroll-left 105s linear infinite;
  white-space:nowrap;
}
@keyframes scroll-left{ from{transform:translateX(0)} to{transform:translateX(-50%)} }
.ticker-item{
  color:rgba(255,255,255,0.92);
  font-family:'JetBrains Mono',monospace;
  font-size:12px; font-weight:500;
  padding:0 20px; letter-spacing:0.5px;
}
.ticker-item .t-pos{ color:#86efac; font-weight:600; }
.ticker-item .t-neg{ color:#fca5a5; font-weight:600; }
.ticker-sep{ opacity:0.3; margin:0 2px; }

/* ── HEADER ── */
header{
  display:grid;
  grid-template-columns: auto 1fr auto auto auto;
  align-items:center;
  gap:20px;
  padding:14px 28px;
  border-bottom:1px solid var(--line);
  background:var(--bg2);
  position:sticky; top:26px; z-index:19;
}
.logo{
  font-size:22px; font-weight:900; letter-spacing:4px;
  text-transform:uppercase; color:var(--text); line-height:1;
  text-decoration:none;
}
.logo span{ color:var(--blue); }
.hdr-meta{
  display:flex; align-items:center; justify-content:center; gap:24px;
  font-family:'JetBrains Mono',monospace;
  font-size:11px; color:var(--muted); letter-spacing:1px;
}
.hdr-meta .v{ color:var(--text); }
.period-stale{ color:var(--red) !important; }
.payoff-hero{
  text-align:right; line-height:1.3;
  padding:4px 20px;
  border-right:1px solid var(--line);
}
.payoff-lbl{
  font-family:'JetBrains Mono',monospace;
  font-size:9px; color:var(--muted); letter-spacing:2px; text-transform:uppercase;
}
.payoff-val{
  font-size:26px; font-weight:800; letter-spacing:-0.5px; line-height:1;
}
.payoff-hint{
  font-family:'JetBrains Mono',monospace;
  font-size:8px; color:var(--muted); letter-spacing:1px;
}
.sp-inline{
  font-family:'JetBrains Mono',monospace;
  text-align:right; line-height:1.4;
}
.sp-inline .n{ font-size:22px; font-weight:700; color:var(--text); }
.sp-inline .c{ font-size:10px; }
.mkt{
  padding:5px 14px; font-size:11px; font-weight:700;
  letter-spacing:2px; border-radius:4px; font-family:'JetBrains Mono',monospace;
  white-space:nowrap;
}
.mkt.open{
  background:rgba(34,197,94,0.12); color:var(--green);
  border:1px solid rgba(34,197,94,0.25);
}
.mkt.open::before{ content:'● '; animation:blink 1.5s ease infinite; }
.mkt.closed{
  background:rgba(239,68,68,0.1); color:var(--red);
  border:1px solid rgba(239,68,68,0.2);
}
.mkt.closed::before{ content:''; }
@keyframes blink{ 0%,100%{opacity:1} 50%{opacity:.4} }
.back-btn{
  background:none; border:1px solid var(--line);
  color:var(--muted); border-radius:6px;
  width:46px; height:46px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:color 0.15s, border-color 0.15s;
  font-size:18px; letter-spacing:-2px; flex-shrink:0; text-decoration:none;
}
.back-btn:hover{ color:var(--text); border-color:var(--dim); }
.pos{ color:var(--green); }
.neg{ color:var(--red); }

/* ── TAB STRIP ── */
.tab-strip{
  display:flex; align-items:center; gap:0;
  overflow-x:auto; scrollbar-width:none;
  border-bottom:1px solid var(--line);
  background:var(--bg2);
  padding:0 20px;
  position:sticky; top:91px; z-index:18;
  flex-shrink:0;
}
.tab-strip::-webkit-scrollbar{ display:none; }
.tab{
  padding:12px 18px;
  font-size:11px; font-weight:700; letter-spacing:2px;
  text-transform:uppercase; color:var(--muted);
  cursor:pointer; transition:color 0.15s;
  user-select:none; white-space:nowrap; border:none; background:none;
  border-bottom:2px solid transparent; margin-bottom:-1px;
}
.tab:hover{ color:var(--text); }
.tab.active{ color:var(--text); border-bottom-color:var(--blue); }

/* ── CONTENT ── */
.content{
  max-width:1200px; margin:0 auto;
  padding:24px 20px 72px;
}

/* ── CHART PANEL ── */
.chart-panel{ display:none; }
.chart-panel.active{ display:block; }

.panel-hdr{
  display:flex; align-items:baseline; justify-content:space-between;
  margin-bottom:6px;
  flex-wrap:wrap; gap:8px;
}
.panel-title{
  font-size:12px; font-weight:700; letter-spacing:2px;
  text-transform:uppercase; color:var(--text);
}
.panel-sub{
  font-family:'JetBrains Mono',monospace;
  font-size:10px; color:var(--muted); letter-spacing:1px;
}

/* ── LEGEND ── */
.legend{
  display:flex; flex-wrap:wrap; gap:6px 18px;
  margin-bottom:16px;
}
.legend-item{
  display:flex; align-items:center; gap:6px;
  font-family:'JetBrains Mono',monospace;
  font-size:11px; color:var(--muted); cursor:pointer;
  user-select:none; transition:opacity 0.15s;
}
.legend-item.dimmed{ opacity:0.25; }
.legend-swatch{
  width:20px; height:3px; border-radius:2px; flex-shrink:0;
}
.prev-crash-badge {
  color: #e8a020;
  font-weight: 600;
  letter-spacing: 0.02em;
  cursor: pointer;
  background: none;
  border: 1px solid rgba(232,160,32,0.4);
  border-radius: 4px;
  padding: 1px 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  transition: background 0.15s, border-color 0.15s;
}
.prev-crash-badge:hover {
  background: rgba(232,160,32,0.12);
  border-color: rgba(232,160,32,0.7);
}
.prev-crash-badge:active {
  background: rgba(232,160,32,0.22);
}

/* ── CANVAS WRAPPER ── */
.chart-wrap{
  position:relative;
  width:100%;
  height:420px;
  background:var(--bg2);
  border:1px solid var(--line);
  border-radius:8px;
  padding:16px 16px 8px;
}

/* ── RESPONSIVE ── */
@media(max-width:1024px){
  .sp-inline .n{ font-size:18px; }
  .hdr-meta{ flex-wrap:wrap; gap:2px 16px; font-size:10px; }
  .hdr-meta span:last-child{ flex-basis:100%; text-align:center; font-size:9px; }
}
@media(max-width:640px){
  header{
    grid-template-columns:1fr auto;
    grid-template-rows:auto auto auto;
    gap:8px 12px; padding:10px 14px;
  }
  .logo{ grid-column:1; grid-row:1; font-size:18px; letter-spacing:3px; }
  .hdr-controls{ grid-column:2; grid-row:1; align-self:center; justify-self:end; }
  .hdr-meta{ grid-column:1/-1; grid-row:2; flex-wrap:wrap; gap:6px 14px; font-size:9px; }
  .payoff-hero{ grid-column:1; grid-row:3; text-align:left; border-right:none; padding:0; }
  .payoff-val{ font-size:22px; }
  .sp-inline{ grid-column:2; grid-row:3; text-align:right; }
  .sp-inline .n{ font-size:20px; }
  .tab{ padding:10px 12px; font-size:10px; letter-spacing:1.5px; }
  .tab-strip{ top:57px; padding:0 10px; }
  .chart-wrap{ height:320px; }
  .content{ padding:16px 10px 40px; }
  .back-btn{ width:36px; height:36px; font-size:16px; }
}
@media(max-width:380px){
  .tab{ padding:8px 10px; font-size:9px; letter-spacing:1px; }
}

/* ── MODAL ── */
.modal-backdrop{
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.75); z-index:10000;
  align-items:center; justify-content:center;
}
.modal-backdrop.open{ display:flex; }
.modal{
  background: linear-gradient(160deg, #1a1f2e 0%, #161a28 60%, #111520 100%);
  border:1px solid rgba(59,130,246,0.3);
  border-radius:12px; max-width:420px; width:92%;
  overflow:hidden;
  animation:modal-in 0.18s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 0 0 1px rgba(59,130,246,0.08), 0 32px 64px rgba(0,0,0,0.7);
}
@keyframes modal-in{
  from{ opacity:0; transform:scale(0.88) translateY(12px); }
  to{   opacity:1; transform:scale(1)    translateY(0); }
}
.modal-hdr{
  background:rgba(59,130,246,0.07); padding:18px 20px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid rgba(59,130,246,0.15);
}
.modal-title{ font-size:22px; font-weight:800; letter-spacing:-0.3px; color:var(--text); }
.modal-close{
  font-size:18px; color:var(--muted); cursor:pointer;
  line-height:1; padding:0 2px; transition:color 0.15s;
}
.modal-close:hover{ color:var(--text); }
.modal-net{
  padding:16px 20px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid rgba(37,38,40,0.6);
}
.modal-net-label{
  font-family:'JetBrains Mono',monospace;
  font-size:9px; color:var(--muted); letter-spacing:2px; text-transform:uppercase;
}
.modal-net-val{ font-size:28px; font-weight:800; letter-spacing:-0.5px; }
.modal table{ width:100%; border-collapse:collapse; }
.modal th{
  padding:5px 20px;
  font-family:'JetBrains Mono',monospace;
  font-size:9px; letter-spacing:1.5px; color:var(--muted);
  text-transform:uppercase; text-align:left;
  background:rgba(59,130,246,0.04); border-bottom:1px solid rgba(37,38,40,0.6);
}
.modal th.r, .modal td.r{ text-align:right; }
.modal td{
  padding:9px 20px;
  font-family:'JetBrains Mono',monospace;
  font-size:13px; color:var(--text);
  border-top:1px solid rgba(37,38,40,0.5);
}
.modal td.pos{ color:var(--green); }
.modal td.neg{ color:var(--red); }
.modal tr:first-child td{ border-top:none; }
.modal-footer{
  padding:10px 20px 14px;
  font-family:'JetBrains Mono',monospace;
  font-size:9px; color:var(--muted); letter-spacing:1px;
  border-top:1px solid rgba(37,38,40,0.5); text-align:center;
}

footer{
  position:fixed; bottom:0; left:0; right:0;
  border-top:1px solid var(--line); padding:8px 28px;
  font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted);
  letter-spacing:1px; display:flex; gap:24px; flex-wrap:wrap;
  justify-content:center; background:var(--bg2);
  z-index:17;
}

/* ── LOADING / ERROR ── */
.loading{
  text-align:center; padding:60px 20px;
  font-family:'JetBrains Mono',monospace;
  font-size:12px; color:var(--muted); letter-spacing:1px;
}
.err{ color:var(--red); }
</style>
</head>
<body>

<!-- Ticker -->
<div class="ticker-wrap"><div class="ticker-track" id="ticker"></div></div>

<!-- Header -->
<header>
  <a href="/" class="logo">K<span>·</span>ETTLE <span style="font-size:13px;letter-spacing:3px;color:var(--muted);font-weight:500;">CHARTS</span></a>
  <div class="hdr-meta">
    <span>PERIOD: <span class="v" id="h-period">—</span></span>
    <span>OWNER: <span class="v" id="h-owner">—</span></span>
    <span>UPDATED: <span class="v" id="h-updated">—</span></span>
  </div>
  <div class="payoff-hero" id="payoff-hero" onclick="openModal()" style="cursor:pointer;">
    <div class="payoff-lbl">PAYOFF</div>
    <div class="payoff-val" id="payoff-val">——</div>
    <div class="payoff-hint">tap for detail</div>
  </div>
  <div class="sp-inline">
    <div class="n" id="sp-n">——</div>
    <div class="c" id="sp-c">—</div>
  </div>
  <div class="hdr-controls" style="display:flex;align-items:center;gap:8px;">
    <div class="mkt closed" id="mkt">—</div>
    <a href="/" class="back-btn" title="Dashboard">← ⊞</a>
  </div>
</header>

<!-- Payoff Detail modal -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title">Payoff Detail</span>
      <span class="modal-close" onclick="closeModal()">✕</span>
    </div>
    <div class="modal-net">
      <span class="modal-net-label">Net Position</span>
      <span class="modal-net-val" id="modal-net">——</span>
    </div>
    <table id="modal-items"></table>
    <div class="modal-footer">click outside to dismiss</div>
  </div>
</div>

<div class="tab-strip" id="tab-strip">
  <button class="tab active" data-panel="leaderboard" onclick="showPanel('leaderboard')">Leaderboard</button>
  <button class="tab"        data-panel="sp"          onclick="showPanel('sp'         )">S&amp;P</button>
  <button class="tab"        data-panel="gainer"      onclick="showPanel('gainer'     )">Gainer</button>
  <button class="tab"        data-panel="loser"       onclick="showPanel('loser'      )">Loser</button>
  <button class="tab"        data-panel="lock"        onclick="showPanel('lock'       )">Lock</button>
  <button class="tab"        data-panel="basket"      onclick="showPanel('basket'     )">Basket</button>
  <button class="tab"        data-panel="payoff"      onclick="showPanel('payoff'     )">Payoff</button>
</div>

<div class="content" id="content">
  <div class="loading" id="loading">Loading history…</div>
</div>

<footer id="ftr"><span>kettle.local</span></footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>

// ── MEMBER COLORS ────────────────────────────────────────────
// Keyed by nickname. Deliberately avoids the UI semantic colors:
// --green (#22c55e), --red (#ef4444), --blue (#3b82f6), --gold (#f59e0b).
const MEMBER_COLORS = {
  Al:    '#60a5fa',
  Bob:   '#f472b6',
  Dave:  '#fb923c',
  Joe:   '#a78bfa',
  Keith: '#facc15',
  Ron:   '#2dd4bf',
  Tim:   '#86efac',
};

// ── ZERO LINE PLUGIN ─────────────────────────────────────────
// Draws a subtle dashed line at y=0 when zero is in view.
// Opt in per chart: plugins: { zeroLine: true }
const zeroLinePlugin = {
  id: 'zeroLine',
  afterDraw(chart) {
    if (!chart.options.plugins.zeroLine) return;
    const yScale = chart.scales.y;
    if (yScale.min > 0 || yScale.max < 0) return;
    const y = yScale.getPixelForValue(0);
    const ctx = chart.ctx;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(chart.chartArea.left, y);
    ctx.lineTo(chart.chartArea.right, y);
    ctx.strokeStyle = '#4a4d54';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
};
Chart.register(zeroLinePlugin);

// ── TRADING DAY LABEL BUILDER ────────────────────────────────
// Generates an array of ISO date strings (YYYY-MM-DD) for every
// weekday from periodStart through periodEnd inclusive.
// Weekend gaps are simply absent — the category scale spaces all
// labels evenly, so Mon→Tue is the same width as Thu→Fri.
// This avoids needing a time-scale adapter entirely.
function buildTradingDayLabels(periodStart, periodEnd) {
  const labels = [];
  if (!periodStart || !periodEnd) return labels;
  // Parse as local noon to avoid DST edge cases shifting the date
  const cur = new Date(periodStart + 'T12:00:00');
  const end = new Date(periodEnd   + 'T12:00:00');
  while (cur <= end) {
    const dow = cur.getDay();
    if (dow !== 0 && dow !== 6) {          // skip Sunday (0) and Saturday (6)
      labels.push(cur.toISOString().slice(0, 10));
    }
    cur.setDate(cur.getDate() + 1);
  }
  return labels;
}

// ── SHARED CHART OPTIONS FACTORY ─────────────────────────────
// Returns a complete Chart.js options object for a line chart.
//   formatValue(v)  — formats a y-axis number for ticks + tooltips
//   reverseY        — true for Loser and Rank (better value at top)
//   extraPlugins    — merged into options.plugins (zeroLine, etc.)
function makeOptions(formatValue, reverseY, periodStart, periodEnd, extraPlugins) {
  return {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 400 },
    plugins: Object.assign({
      legend: { display: false },
      zeroLine: false,
      tooltip: {
        backgroundColor: '#1c1d1f',
        borderColor: '#252628',
        borderWidth: 1,
        titleColor: '#7c7f87',
        bodyColor: '#e8e9ea',
        titleFont: { family: "'JetBrains Mono', monospace", size: 10 },
        bodyFont: { family: "'JetBrains Mono', monospace", size: 12 },
        padding: 10,
        callbacks: {
          // Show date as M/D in tooltip title
          title(items) {
            if (!items.length) return '';
            const iso = items[0].label;
            const parts = iso.split('-');
            return parseInt(parts[1]) + '/' + parseInt(parts[2]);
          },
          label(ctx) {
            return '  ' + ctx.dataset.label + '  ' + formatValue(ctx.parsed.y);
          }
        }
      }
    }, extraPlugins || {}),
    scales: {
      x: {
        type: 'category',
        grid: { color: '#1c1d1f' },
        border: { color: '#252628' },
        ticks: {
          color: '#7c7f87',
          font: { family: "'JetBrains Mono', monospace", size: 10 },
          maxRotation: 45,
          autoSkip: true,
          maxTicksLimit: 12,
          // Display as M/D instead of raw ISO string
          callback(val, idx) {
            const iso = this.getLabelForValue(idx);
            if (!iso) return '';
            const parts = iso.split('-');
            return parseInt(parts[1]) + '/' + parseInt(parts[2]);
          }
        }
      },
      y: {
        reverse: !!reverseY,
        grid: { color: '#252628' },
        border: { color: '#252628' },
        ticks: {
          color: '#7c7f87',
          font: { family: "'JetBrains Mono', monospace", size: 10 },
          callback: v => formatValue(v)
        },
        afterDataLimits(scale) {
          const range = scale.max - scale.min;
          if (range === 0) return;
          const pad = range * 0.08;
          scale.min -= pad;
          scale.max += pad;
        }
      }
    }
  };
}

// ── DATASET BUILDER ──────────────────────────────────────────
// Builds a Chart.js dataset array. Each data point is a sparse array
// aligned to the full trading-day labels array — null for days with
// no data, which renders as a gap in the line.
//   members  — array of nicknames (from history JSON, stable order)
//   days     — array of day objects from history
//   labels   — full trading-day label array from buildTradingDayLabels
//   accessor — fn(memberDayObj) → number | null
function buildDatasets(members, days, labels, accessor) {
  // Build a date→value map for each member for fast lookup
  return members.map(nick => {
    const color = MEMBER_COLORS[nick] || '#7c7f87';
    const nickIdx = members.indexOf(nick);
    // Map date string → value
    const valueMap = {};
    days.forEach(day => {
      const mObj = day.m ? day.m[nickIdx] : null;
      if (mObj) {
        const v = accessor(mObj);
        if (v != null && !isNaN(v)) valueMap[day.date] = v;
      }
    });
    // Align to labels array — null for missing dates
    const data = labels.map(iso => valueMap[iso] != null ? valueMap[iso] : null);
    return {
      label: nick,
      data,
      borderColor: color,
      backgroundColor: color + '22',
      borderWidth: 2,
      pointRadius: 0,
      pointHoverRadius: 4,
      pointBackgroundColor: color,
      tension: 0.3,
      spanGaps: false,
    };
  });
}

// ── LEGEND BUILDER ───────────────────────────────────────────
// Renders a clickable HTML legend that toggles dataset visibility.
function buildLegend(legendEl, chart, members) {
  legendEl.innerHTML = '';
  members.forEach((nick, i) => {
    const color = MEMBER_COLORS[nick] || '#7c7f87';
    const item = document.createElement('span');
    item.className = 'legend-item';
    item.innerHTML =
      `<span class="legend-swatch" style="background:${color}"></span>${nick}`;
    item.addEventListener('click', () => {
      const meta = chart.getDatasetMeta(i);
      meta.hidden = !meta.hidden;
      item.classList.toggle('dimmed', meta.hidden);
      chart.update();
    });
    legendEl.appendChild(item);
  });
}

// ── PANEL HELPERS ────────────────────────────────────────────
// Creates the standard panel skeleton (header, legend, canvas wrapper)
// and returns { panelEl, legendEl, canvasEl }.
function makePanel(id, title, sub) {
  const panel = document.createElement('div');
  panel.className = 'chart-panel';
  panel.id = 'panel-' + id;

  panel.innerHTML = `
    <div class="panel-hdr">
      <span class="panel-title">${title}</span>
      <span class="panel-sub" id="sub-${id}">${sub}</span>
    </div>
    <div class="legend" id="legend-${id}"></div>
    <div class="chart-wrap">
      <canvas id="canvas-${id}"></canvas>
    </div>`;
  return panel;
}

// ── STATE ────────────────────────────────────────────────────
let g_charts   = {};
let g_history  = null;
let g_liveData = null;   // populated from /data.json; used by openModal()

// ── PANEL SWITCH ─────────────────────────────────────────────
function showPanel(id) {
  document.querySelectorAll('.chart-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.panel === id));
  const panel = document.getElementById('panel-' + id);
  if (panel) panel.classList.add('active');
}

// ── CHART RENDERERS ──────────────────────────────────────────

function renderGainer(hist) {
  const { members, days, labels, periodStart, periodEnd } = hist;
  const datasets = buildDatasets(members, days, labels, m => m.gainer ? m.gainer.pct : null);
  const chart = new Chart(document.getElementById('canvas-gainer'), {
    type: 'line',
    data: { labels, datasets },
    options: makeOptions(v => v.toFixed(1) + '%', false, periodStart, periodEnd, { zeroLine: true })
  });
  buildLegend(document.getElementById('legend-gainer'), chart, members);
  g_charts.gainer = chart;
}

function renderLoser(hist) {
  const { members, days, labels, periodStart, periodEnd } = hist;
  const datasets = buildDatasets(members, days, labels, m => m.loser ? m.loser.pct : null);
  const chart = new Chart(document.getElementById('canvas-loser'), {
    type: 'line',
    data: { labels, datasets },
    options: makeOptions(v => v.toFixed(1) + '%', true, periodStart, periodEnd, { zeroLine: true })
  });
  buildLegend(document.getElementById('legend-loser'), chart, members);
  g_charts.loser = chart;
}

function renderLock(hist) {
  const { members, days, labels, periodStart, periodEnd } = hist;
  const datasets = buildDatasets(members, days, labels, m => m.lock ? m.lock.pct : null);
  const chart = new Chart(document.getElementById('canvas-lock'), {
    type: 'line',
    data: { labels, datasets },
    options: makeOptions(v => v.toFixed(1) + '%', false, periodStart, periodEnd, { zeroLine: true })
  });
  buildLegend(document.getElementById('legend-lock'), chart, members);
  g_charts.lock = chart;
}

function renderBasket(hist) {
  const { members, days, labels, periodStart, periodEnd } = hist;
  const datasets = buildDatasets(members, days, labels, m => m.basket ? m.basket.pct : null);
  const chart = new Chart(document.getElementById('canvas-basket'), {
    type: 'line',
    data: { labels, datasets },
    options: makeOptions(v => v.toFixed(1) + '%', false, periodStart, periodEnd, { zeroLine: true })
  });
  buildLegend(document.getElementById('legend-basket'), chart, members);
  g_charts.basket = chart;
}

function renderSP(hist) {
  const { members, days, labels, periodStart, periodEnd } = hist;
  const datasets = buildDatasets(members, days, labels, m => m.sp ? m.sp.pct_off : null);
  const chart = new Chart(document.getElementById('canvas-sp'), {
    type: 'line',
    data: { labels, datasets },
    options: makeOptions(v => v.toFixed(1) + '%', true, periodStart, periodEnd, { zeroLine: false })
  });
  buildLegend(document.getElementById('legend-sp'), chart, members);
  g_charts.sp = chart;
}

function renderLeaderboard(hist) {
  const { members, days, labels, periodStart, periodEnd } = hist;
  const datasets = buildDatasets(members, days, labels, m => m.lb_rank != null ? m.lb_rank : null);
  const n = members.length;
  const opts = makeOptions(v => Math.round(v) === v ? '#' + Math.round(v) : '', true, periodStart, periodEnd, { zeroLine: false });
  opts.scales.y.min = 0.5;
  opts.scales.y.max = n + 0.5;
  opts.scales.y.ticks.stepSize = 1;
  opts.scales.y.afterDataLimits = () => {};
  const chart = new Chart(document.getElementById('canvas-leaderboard'), {
    type: 'line',
    data: { labels, datasets },
    options: opts
  });
  buildLegend(document.getElementById('legend-leaderboard'), chart, members);
  g_charts.leaderboard = chart;
}

function renderPayoff(hist) {
  const { members, days, labels, periodStart, periodEnd } = hist;
  const datasets = buildDatasets(members, days, labels, m => m.net != null ? m.net : null);
  const chart = new Chart(document.getElementById('canvas-payoff'), {
    type: 'line',
    data: { labels, datasets },
    options: makeOptions(v => (v >= 0 ? '+$' : '-$') + Math.abs(Math.round(v)), false, periodStart, periodEnd, { zeroLine: true })
  });
  buildLegend(document.getElementById('legend-payoff'), chart, members);
  g_charts.payoff = chart;
}

// ── BUILD ALL PANELS ─────────────────────────────────────────
function buildPanels(hist) {
  const content = document.getElementById('content');
  content.innerHTML = '';

  const PANELS = [
    { id: 'leaderboard', title: 'Leaderboard',  sub: 'rank over time — #1 at top',                       render: renderLeaderboard },
    { id: 'sp',          title: 'S&amp;P Pred', sub: '% error from index — inverted (closer = better at top)', render: renderSP },
    { id: 'gainer',      title: 'Gainer',        sub: '% gain from season open',                          render: renderGainer      },
    { id: 'loser',       title: 'Loser',          sub: '% change — inverted (lower = better at top)',     render: renderLoser       },
    { id: 'lock',        title: 'Lock',           sub: '% gain from season open',                         render: renderLock        },
    { id: 'basket',      title: 'Basket',         sub: '3-stock average % gain',                          render: renderBasket      },
    { id: 'payoff',      title: 'Payoff',         sub: 'net position in dollars',                         render: renderPayoff      },
  ];

  PANELS.forEach(p => content.appendChild(makePanel(p.id, p.title, p.sub)));
  PANELS.forEach(p => p.render(hist));

  // Restore active panel from hash, default to leaderboard
  const hash = location.hash.replace('#', '');
  if (hash && PANELS.find(p => p.id === hash)) {
    showPanel(hash);
  } else {
    showPanel('leaderboard');
  }
}

// ── DATA PREP ────────────────────────────────────────────────
function prepHistory(raw) {
  const members = raw.members;
  const days = raw.days || [];
  days.sort((a, b) => a.date < b.date ? -1 : a.date > b.date ? 1 : 0);

  const today = new Date().toISOString().slice(0, 10);
  const periodStart = raw.period_start || (days.length ? days[0].date : today);
  const periodEnd   = raw.period_end   || today;

  // Pre-compute the full trading-day label array once; all charts share it.
  const labels = buildTradingDayLabels(periodStart, periodEnd);

  return { members, days, labels, periodStart, periodEnd, period: raw.period };
}

// ── HEADER HELPERS ───────────────────────────────────────────
function fmt(v, d=2){ return v==null?'—':Number(v).toFixed(d); }
function fmtP(v){ return v==null?'—':(v>=0?'+':'')+Number(v).toFixed(2)+'%'; }
function fmtD(v){ return v==null?'—':(v>=0?'+$':'-$')+Math.abs(v); }
function pc(v){ return v==null?'':v>=0?'pos':'neg'; }

function buildTicker(d) {
  const src = (d.ticker && d.ticker.length) ? d.ticker : [];
  if (!src.length) return;
  const items = src.map(e => {
    const pct = e.daily_pct;
    const pctStr = pct!=null ? `<span class="${pct>=0?'t-pos':'t-neg'}">${fmtP(pct)}</span>` : '';
    return `<span class="ticker-item"><span style="font-weight:600">${e.sym}</span> ${fmt(e.price)} ${pctStr}<span class="ticker-sep"> | </span></span>`;
  }).join('');
  document.getElementById('ticker').innerHTML = items + items;
}

function renderHeader(data, status) {
  const m = data.meta;
  const hPeriod = document.getElementById('h-period');
  hPeriod.textContent = m.period;
  hPeriod.classList.toggle('period-stale', !!(status && status.stale));
  document.getElementById('h-owner').textContent   = m.owner_nick;
  document.getElementById('h-updated').textContent = (m.updated || '').replace('T', ' ');

  const sp = data.sp_index;
  const sc = sp.change_pct >= 0 ? 'pos' : 'neg';
  document.getElementById('sp-n').textContent  = fmt(sp.current);
  document.getElementById('sp-c').innerHTML    =
    `<span class="${sc}">${fmtP(sp.change_pct)} &nbsp; ${sp.change>=0?'+':''}${fmt(sp.change)}</span>`;

  const pv = document.getElementById('payoff-val');
  pv.textContent = fmtD(data.payoff.total);
  pv.className   = 'payoff-val ' + pc(data.payoff.total);

  if (status) {
    const open = status.market_open;
    const mkt  = document.getElementById('mkt');
    mkt.textContent = open ? 'OPEN' : '○ CLOSED';
    mkt.className   = 'mkt ' + (open ? 'open' : 'closed');
  }

  buildTicker(data);

  if (status) {
    const heap = Math.round(status.free_heap / 1024) + 'KB';
    const up   = Math.floor(status.uptime_s / 3600) + 'h' +
                 String(Math.floor((status.uptime_s % 3600) / 60)).padStart(2, '0') + 'm';
    document.getElementById('ftr').innerHTML =
      `<span><b>kettle.local</b></span><span><b>v</b>${status.version}</span>` +
      `<span><b>id</b> ${status.device_id}</span><span><b>up</b> ${up}</span>` +
      `<span><b>heap</b> ${heap}</span><span><b>rssi</b> ${status.wifi_rssi}dBm</span>` +
      (status.battery_present ? `<span><b>batt</b> ${status.battery_pct}%</span>` : '') +
      (status.prev_crash_reason ? `<button class="prev-crash-badge" onclick="downloadDiagBundle()" title="Prev crash: ${{3:'PANIC',7:'INT_WDT',8:'TASK_WDT'}[status.prev_crash_reason]||'reason '+status.prev_crash_reason} — click to download diagnostics">⚠ DIAG</button>` : '');
  }
}

// ── MODAL ────────────────────────────────────────────────────
function openModal() {
  if (!g_liveData) return;
  const p = g_liveData.payoff;
  document.getElementById('modal-net').textContent = fmtD(p.total);
  document.getElementById('modal-net').className   = 'modal-net-val ' + pc(p.total);
  document.getElementById('modal-items').innerHTML =
    (p.items || []).map(i =>
      `<tr><td>${i.label}</td><td class="r ${i.amount>=0?'pos':'neg'}">${fmtD(i.amount)}</td></tr>`
    ).join('');
  document.getElementById('modal-backdrop').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-backdrop')) return;
  document.getElementById('modal-backdrop').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modal-backdrop').classList.remove('open');
});

// ── FETCH & INIT ─────────────────────────────────────────────
async function init() {
  // Fetch history and live data in parallel
  const [histRes, dataRes, statusRes] = await Promise.all([
    fetch('/history.json'),
    fetch('/data.json').catch(() => null),
    fetch('/status.json').catch(() => null),
  ]);

  // Populate header from live data if available (non-fatal if missing)
  try {
    if (dataRes && dataRes.ok) {
      const data   = await dataRes.json();
      const status = (statusRes && statusRes.ok) ? await statusRes.json() : null;
      g_liveData = data;
      renderHeader(data, status);
    }
  } catch(e) {
    // Header stays at defaults — not a blocker for charts
  }

  // Load history
  try {
    if (!histRes.ok) throw new Error('HTTP ' + histRes.status);
    const raw = await histRes.json();

    if (!raw.members || !raw.days || raw.days.length === 0) {
      document.getElementById('content').innerHTML =
        '<div class="loading">No history data available yet.</div>';
      return;
    }

    g_history = prepHistory(raw);
    buildPanels(g_history);

  } catch(e) {
    document.getElementById('loading').innerHTML =
      '<span class="err">Failed to load history: ' + e.message + '</span>';
  }
}

// Persist active panel in URL hash so back/forward works
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    location.hash = tab.dataset.panel;
  });
});

init();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
// ── DIAGNOSTIC BUNDLE DOWNLOAD ───────────────────────────────────────────────
// Fetches current log, previous log, and core dump (if present) from Kettle,
// packages them into a ZIP, and triggers a browser download.
async function downloadDiagBundle() {
  const btn = document.querySelector('.prev-crash-badge');
  if (btn) { btn.textContent = '⏳ …'; btn.disabled = true; }

  try {
    const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    const zip = new JSZip();
    const folder = zip.folder('kettle-diag-' + ts);

    // Fetch all three sources in parallel; coredump is optional (404 is fine).
    const [curRes, prevRes, dumpRes, statusRes] = await Promise.all([
      fetch('/log'),
      fetch('/log/prev'),
      fetch('/api/coredump').catch(() => null),
      fetch('/status.json').catch(() => null),
    ]);

    if (curRes.ok) {
      folder.file('session.log', await curRes.text());
    }
    if (prevRes.ok) {
      folder.file('session-prev.log', await prevRes.text());
    }
    if (dumpRes && dumpRes.ok) {
      // Content-Disposition carries the original filename (e.g. CORE_12345.raw)
      const cd = dumpRes.headers.get('Content-Disposition') || '';
      const match = cd.match(/filename="?([^";\r\n]+)"?/);
      const dumpName = match ? match[1] : 'coredump.raw';
      folder.file(dumpName, await dumpRes.arrayBuffer());
    }

    // manifest.txt — records version and device so the correct ELF can be
    // retrieved from the GitHub release when decoding the core dump.
    let manifest = `Kettle Diagnostic Bundle\n`;
    manifest    += `Captured: ${new Date().toISOString()}\n`;
    if (statusRes && statusRes.ok) {
      const st = await statusRes.json();
      manifest += `Version:   ${st.version || 'unknown'}\n`;
      manifest += `Device ID: ${st.device_id || 'unknown'}\n`;
      manifest += `Uptime:    ${st.uptime_s || 0}s\n`;
    }
    manifest += `\nTo decode the core dump:\n`;
    manifest += `  1. Download the matching ELF from the GitHub release for the version above.\n`;
    manifest += `  2. Run: esp-coredump info_corefile -t raw -c <dump>.raw <version>.elf --gdb <path-to-gdb>\n`;
    folder.file('manifest.txt', manifest);

    const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'kettle-diag-' + ts + '.zip';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    if (btn) { btn.textContent = '⚠ DIAG'; btn.disabled = false; }
  } catch (e) {
    console.error('Diag bundle error:', e);
    if (btn) { btn.textContent = '⚠ DIAG'; btn.disabled = false; }
    alert('Diagnostic download failed. Check the browser console for details.');
  }
}
</script>
