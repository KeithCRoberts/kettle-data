<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kettle</title>

<!-- Theme color: tints the Chrome browser bar to match the app background -->
<meta name="theme-color" content="#111213">

<!-- Web app manifest (enables polished install icon + standalone mode) -->
<link rel="manifest" href="/manifest.json">

<!-- Favicon: inline SVG, works in all modern browsers without a LittleFS fetch -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231a1f2e'/%3E%3Cg transform='translate(-3,-3) rotate(-45,16,16)'%3E%3Cpath d='M2,22 L10,14 L16,18 L22,14 L30,22 L22,20 L16,23 L10,20 Z' fill='%235DCAA5'/%3E%3C/g%3E%3Cline x1='21' y1='20' x2='21' y2='29' stroke='%23EF9F27' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='21' y1='24.5' x2='27' y2='20' stroke='%23EF9F27' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='21' y1='24.5' x2='27' y2='29' stroke='%23EF9F27' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="icon" type="image/svg+xml" sizes="32x32" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231a1f2e'/%3E%3Cg transform='translate(-3,-3) rotate(-45,16,16)'%3E%3Cpath d='M2,22 L10,14 L16,18 L22,14 L30,22 L22,20 L16,23 L10,20 Z' fill='%235DCAA5'/%3E%3C/g%3E%3Cline x1='21' y1='20' x2='21' y2='29' stroke='%23EF9F27' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='21' y1='24.5' x2='27' y2='20' stroke='%23EF9F27' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='21' y1='24.5' x2='27' y2='29' stroke='%23EF9F27' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E">

<!-- Apple touch icon: iOS "Add to Home Screen" — inline SVG not supported by iOS,
     so this falls back gracefully; a proper PNG would need to be served from LittleFS -->
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg:        #111213;
  --bg2:       #161718;
  --bg3:       #1c1d1f;
  --line:      #252628;
  --line2:     rgba(37,38,40,0.6);
  --text:      #e8e9ea;
  --muted:     #7c7f87;
  --dim:       #4a4d54;
  --green:     #22c55e;
  --red:       #ef4444;
  --blue:      #3b82f6;
  --gold:      #f59e0b;
  --owner-bg:  #13181e;
  --owner-ln:  #3b82f6;
}

*{ box-sizing:border-box; margin:0; padding:0; }

body{
  background:var(--bg); color:var(--text);
  font-family:'Inter Tight',sans-serif;
  font-size:16px; min-height:100vh; overflow-x:hidden;
}

/* ── TICKER ── */
.ticker-wrap{
  background: linear-gradient(90deg,var(--blue) 0%,#6366f1 40%,#8b5cf6 70%,#a855f7 100%);
  overflow:hidden; height:26px; display:flex; align-items:center;
  position:sticky; top:0; z-index:20;
}
.ticker-track{
  display:flex;
  animation:scroll-left 105s linear infinite;
  white-space:nowrap;
}
@keyframes scroll-left{ from{transform:translateX(0)} to{transform:translateX(-50%)} }
.ticker-item{
  color:rgba(255,255,255,0.92);
  font-family:'JetBrains Mono',monospace;
  font-size:12px; font-weight:500;
  padding:0 20px; letter-spacing:0.5px;
}
.ticker-item .t-pos{ color:#86efac; font-weight:600; }
.ticker-item .t-neg{ color:#fca5a5; font-weight:600; }
.ticker-sep{ opacity:0.3; margin:0 2px; }

/* ── HEADER ── */
header{
  display:grid;
  grid-template-columns: auto 1fr auto auto auto;
  align-items:center;
  gap:20px;
  padding:14px 28px;
  border-bottom:1px solid var(--line);
  background:var(--bg2);
  position:sticky; top:26px; z-index:19;
}
.logo{
  font-size:22px; font-weight:900; letter-spacing:4px;
  text-transform:uppercase; color:var(--text); line-height:1;
}
.logo span{ color:var(--blue); }

.hdr-meta{
  display:flex; align-items:center; justify-content:center; gap:24px;
  font-family:'JetBrains Mono',monospace;
  font-size:11px; color:var(--muted); letter-spacing:1px;
}
.hdr-meta .v{ color:var(--text); }

/* Payoff hero — clickable */
.payoff-hero{
  text-align:right; line-height:1.3;
  cursor:pointer;
  padding:4px 20px;
  border-right:1px solid var(--line);
  transition:opacity 0.15s;
  user-select:none;
}
.payoff-hero:hover{ opacity:0.7; }
.payoff-lbl{
  font-family:'JetBrains Mono',monospace;
  font-size:9px; color:var(--muted); letter-spacing:2px; text-transform:uppercase;
}
.payoff-val{
  font-size:26px; font-weight:800; letter-spacing:-0.5px; line-height:1;
}
.payoff-hint{
  font-family:'JetBrains Mono',monospace;
  font-size:8px; color:var(--muted); letter-spacing:1px;
}

/* S&P in header */
.sp-inline{
  font-family:'JetBrains Mono',monospace;
  text-align:right; line-height:1.4;
}
.sp-inline .n{ font-size:22px; font-weight:700; color:var(--text); }
.sp-inline .c{ font-size:10px; }

.mkt{
  padding:5px 14px; font-size:11px; font-weight:700;
  letter-spacing:2px; border-radius:4px; font-family:'JetBrains Mono',monospace;
  white-space:nowrap;
}
.mkt.open{
  background:rgba(34,197,94,0.12); color:var(--green);
  border:1px solid rgba(34,197,94,0.25);
}
.mkt.open::before{ content:'● '; animation:blink 1.5s ease infinite; }
.mkt.closed{
  background:rgba(239,68,68,0.1); color:var(--red);
  border:1px solid rgba(239,68,68,0.2);
}
.mkt.closed::before{ content:''; }
@keyframes blink{ 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── MODAL ── */
.modal-backdrop{
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.75); z-index:10000;
  align-items:center; justify-content:center;
}
.modal-backdrop.open{ display:flex; }
.modal{
  background: linear-gradient(160deg, #1a1f2e 0%, #161a28 60%, #111520 100%);
  border:1px solid rgba(59,130,246,0.3);
  border-radius:12px; max-width:420px; width:92%;
  overflow:hidden;
  animation:modal-in 0.18s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 0 0 1px rgba(59,130,246,0.08), 0 32px 64px rgba(0,0,0,0.7);
}
@keyframes modal-in{
  from{ opacity:0; transform:scale(0.88) translateY(12px); }
  to{   opacity:1; transform:scale(1)    translateY(0); }
}
.modal-hdr{
  background:rgba(59,130,246,0.07); padding:18px 20px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid rgba(59,130,246,0.15);
}
.modal-title{
  font-size:22px; font-weight:800; letter-spacing:-0.3px;
  text-transform:none; color:var(--text);
}
.modal-owner{
  font-family:'JetBrains Mono',monospace;
  font-size:10px; color:var(--blue); letter-spacing:1.5px;
  text-transform:uppercase;
}
.modal-close{
  font-size:18px; color:var(--muted); cursor:pointer;
  line-height:1; padding:0 2px; transition:color 0.15s;
}
.modal-close:hover{ color:var(--text); }

.modal-net{
  padding:16px 20px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid rgba(37,38,40,0.6);
}
.modal-net-label{
  font-family:'JetBrains Mono',monospace;
  font-size:9px; color:var(--muted); letter-spacing:2px; text-transform:uppercase;
}
.modal-net-val{
  font-size:28px; font-weight:800; letter-spacing:-0.5px;
}

/* shared modal table style */
.modal table{ width:100%; border-collapse:collapse; }
.modal th{
  padding:5px 20px;
  font-family:'JetBrains Mono',monospace;
  font-size:9px; letter-spacing:1.5px; color:var(--muted);
  text-transform:uppercase; text-align:left;
  background:rgba(59,130,246,0.04); border-bottom:1px solid rgba(37,38,40,0.6);
}
.modal th.r, .modal td.r{ text-align:right; }
.modal td{
  padding:9px 20px;
  font-family:'JetBrains Mono',monospace;
  font-size:13px; color:var(--text);
  border-top:1px solid rgba(37,38,40,0.5);
}
.modal td.pos{ color:var(--green); }
.modal td.neg{ color:var(--red); }
.modal tr:first-child td{ border-top:none; }
.modal tr.me{ background:var(--owner-bg); }
.modal tr.me td:first-child{ box-shadow:inset 2px 0 0 var(--owner-ln); }

.modal-footer{
  padding:10px 20px 14px;
  font-family:'JetBrains Mono',monospace;
  font-size:9px; color:var(--muted); letter-spacing:1px;
  border-top:1px solid rgba(37,38,40,0.5); text-align:center;
}

/* ── MEMBER CARD ── */
.mc-backdrop{
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.75); z-index:10001;
  align-items:center; justify-content:center;
}
.mc-backdrop.open{ display:flex; }

.mc{
  width:340px; max-width:92%;
  background: linear-gradient(160deg, #1a1f2e 0%, #161a28 60%, #111520 100%);
  border:1px solid rgba(59,130,246,0.3);
  border-radius:12px; overflow:hidden;
  box-shadow: 0 0 0 1px rgba(59,130,246,0.08), 0 32px 64px rgba(0,0,0,0.7);
  animation:mc-in 0.18s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes mc-in{
  from{ opacity:0; transform:scale(0.88) translateY(12px); }
  to{   opacity:1; transform:scale(1)    translateY(0); }
}

.mc-hdr{
  padding:18px 20px 14px;
  background:rgba(59,130,246,0.07);
  border-bottom:1px solid rgba(59,130,246,0.15);
  display:flex; align-items:flex-start; justify-content:space-between;
}
.mc-name{
  font-size:22px; font-weight:800; letter-spacing:-0.3px;
  color:var(--text); line-height:1;
}
.mc-period{
  font-family:'JetBrains Mono',monospace;
  font-size:10px; color:var(--blue); letter-spacing:1.5px;
  text-transform:uppercase; margin-top:5px;
}
.mc-close{
  font-size:18px; color:var(--muted); cursor:pointer;
  line-height:1; padding:0 2px; transition:color 0.15s;
  margin-top:2px;
}
.mc-close:hover{ color:var(--text); }

.mc-rows{ padding:14px 0; }

.mc-row{
  display:grid;
  grid-template-columns: 90px 28px 1fr 52px;
  align-items:center;
  gap:0 8px;
  padding:9px 20px;
  border-bottom:1px solid rgba(37,38,40,0.5);
}
.mc-row:last-child{ border-bottom:none; }

.mc-cat{
  font-family:'JetBrains Mono',monospace;
  font-size:10px; letter-spacing:1.5px; color:var(--muted);
  text-transform:uppercase;
}
.mc-rank{
  font-size:15px; font-weight:800;
  font-family:'Inter Tight',sans-serif;
  text-align:center;
}
.mc-rank.g1{ color:var(--gold); }
.mc-rank.g2{ color:#94a3b8; }
.mc-rank.g3{ color:#cd8b3b; }
.mc-rank.g4{ color:var(--muted); }

.mc-bar-wrap{
  display:flex; align-items:center; gap:7px;
}
.mc-val{
  font-family:'JetBrains Mono',monospace;
  font-size:12px; white-space:nowrap; min-width:62px; text-align:right;
}
.mc-sb{
  flex:1; height:3px; background:#2a2d35;
  border-radius:2px; overflow:hidden;
}
.mc-sbf{
  display:block; height:100%; border-radius:2px; transition:width 0.3s ease;
}
.mc-sbf.pos{ background:var(--green); }
.mc-sbf.neg{ background:var(--red); }

/* make owner names clickable wherever they appear */
.owner-name{
  cursor:pointer;
  border-bottom:1px dotted rgba(59,130,246,0.4);
  transition:color 0.15s, border-color 0.15s;
}
.owner-name:hover{
  color:var(--blue);
  border-bottom-color:var(--blue);
}

.gear-btn{
  background:none; border:1px solid var(--line);
  color:var(--muted); border-radius:6px;
  width:46px; height:46px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:color 0.15s, border-color 0.15s;
  font-size:20px; flex-shrink:0;
}
.gear-btn:hover{ color:var(--text); border-color:var(--dim); }

.chart-btn{
  background:none; border:1px solid var(--line);
  color:var(--muted); border-radius:6px;
  width:46px; height:46px; display:flex; align-items:center; justify-content:center;
  transition:color 0.15s, border-color 0.15s;
  font-size:18px; letter-spacing:-1px; flex-shrink:0; text-decoration:none;
}
.chart-btn:hover{ color:var(--text); border-color:var(--dim); }

/* ── CONTENT ── */
.content{
  max-width:1200px; margin:0 auto;
  padding:16px 20px 40px;
}

/* ── GRID: 3 rows × 2 cols ── */
.floor{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* ── CARDS ── */
.card{
  background:var(--bg2); border:1px solid var(--line);
  border-radius:8px; overflow:hidden;
}
.c-hdr{
  padding:0 16px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--line);
  background:var(--bg3);
}
.c-hdr-simple{
  padding:10px 16px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--line);
  background:var(--bg3);
}
/* Tab strip variant */
.c-tabs{
  display:flex; align-items:stretch; gap:0; flex:1;
}
.c-tab{
  padding:10px 14px 10px;
  font-size:12px; font-weight:700; letter-spacing:2px;
  text-transform:uppercase; color:var(--muted);
  cursor:pointer;
  transition:color 0.15s;
  user-select:none; white-space:nowrap;
}
.c-tab:hover{ color:var(--text); }
.c-tab.active{ color:var(--text); }
.c-tab-sep{
  color:var(--muted); padding:10px 2px;
  font-size:12px; user-select:none;
}
.c-title{
  font-size:12px; font-weight:700; letter-spacing:2px;
  text-transform:uppercase; color:var(--text);
}
.c-sub{
  font-family:'JetBrains Mono',monospace;
  font-size:10px; color:var(--muted); letter-spacing:1px;
}

/* ── TABLES ── */
table{ width:100%; border-collapse:collapse; }
th{
  padding:6px 14px;
  font-family:'JetBrains Mono',monospace;
  font-size:11px; letter-spacing:1.5px; color:var(--muted);
  text-transform:uppercase; text-align:left;
  background:var(--bg3); border-bottom:1px solid var(--line);
}
th.r, td.r{ text-align:right; }
td{
  padding:9px 14px; font-size:15px;
  font-family:'JetBrains Mono',monospace;
  border-top:1px solid var(--line2); color:var(--text);
}
tr:first-child td{ border-top:none; }
tr.me{ background:var(--owner-bg); }
tr.me td:first-child{ box-shadow:inset 2px 0 0 var(--owner-ln); }

.pos{ color:var(--green); }
.neg{ color:var(--red); }
.dim{ color:var(--muted); }
.hi { color:var(--text); font-weight:600; }
.gold{ color:var(--gold); }

/* rank cells */
.rk{ width:26px; padding-right:4px; }
.rk span{ font-size:13px; font-weight:700; font-family:'Inter Tight',sans-serif; color:var(--muted); }
.rk span.g1{ color:var(--gold); }
.rk span.g2{ color:#94a3b8; }
.rk span.g3{ color:#cd8b3b; }

/* ticker symbol links */
.sym-link{
  color:inherit; text-decoration:none;
}
.sym-link:hover{
  text-decoration:underline; text-underline-offset:3px;
  text-decoration-color:var(--muted);
}
.sym-sep{ color:var(--muted); }

/* badges */
.lk{
  font-size:7px; font-weight:700; color:var(--gold);
  border:1px solid rgba(245,158,11,.35);
  background:rgba(245,158,11,.08);
  padding:1px 4px; border-radius:3px; margin-left:4px; letter-spacing:1px;
}
.sp-badge{
  font-size:7px; font-weight:700; color:#60a5fa;
  border:1px solid rgba(96,165,250,.35);
  background:rgba(96,165,250,.08);
  padding:1px 4px; border-radius:3px; margin-left:4px; letter-spacing:1px;
}

/* inline score bar */
.sbar{ display:inline-flex; align-items:center; gap:7px; }

/* tappable locked gain — counterfactual toggle */
.cf-tap{
  cursor:pointer;
  transition:color 0.15s;
}
.cf-active{ color:var(--muted) !important; font-style:italic; }
.sb{
  width:48px; height:3px; background:#45484f;
  border-radius:2px; overflow:hidden; display:inline-block; vertical-align:middle;
}
.sbf{ display:block; height:100%; border-radius:2px; }
.sbf.pos{ background:var(--green); }
.sbf.neg{ background:var(--red); }

/* ── FOOTER ── */
footer{
  border-top:1px solid var(--line); margin-top:0; padding:12px 28px;
  font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted);
  letter-spacing:1px; display:flex; gap:24px; flex-wrap:wrap;
  justify-content:center;
  background:var(--bg2);
}

.loading{
  padding:80px; text-align:center;
  color:var(--muted); letter-spacing:3px; font-size:10px;
  grid-column:1/-1;
}

.cfg-backdrop{
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.75); z-index:10002;
  align-items:center; justify-content:center;
}
.cfg-backdrop.open{ display:flex; }
.cfg-modal{
  background: linear-gradient(160deg, #1a1f2e 0%, #161a28 60%, #111520 100%);
  border:1px solid rgba(59,130,246,0.3);
  border-radius:12px; width:92%; max-width:480px;
  max-height:88vh; display:flex; flex-direction:column;
  box-shadow: 0 0 0 1px rgba(59,130,246,0.08), 0 32px 64px rgba(0,0,0,0.7);
  animation:modal-in 0.18s cubic-bezier(0.34,1.56,0.64,1);
}
.cfg-hdr{
  background:rgba(59,130,246,0.07); padding:18px 20px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid rgba(59,130,246,0.15);
  flex-shrink:0;
}
.cfg-title{
  font-size:18px; font-weight:800; letter-spacing:-0.3px; color:var(--text);
}
.cfg-close{
  font-size:18px; color:var(--muted); cursor:pointer;
  line-height:1; padding:0 2px; transition:color 0.15s;
}
.cfg-close:hover{ color:var(--text); }
.cfg-body{
  overflow-y:auto; padding:0 0 8px;
  flex:1;
}
.cfg-section{
  padding:14px 20px 4px;
  border-bottom:1px solid var(--line);
}
.cfg-section:last-child{ border-bottom:none; }
.cfg-section-title{
  font-family:'JetBrains Mono',monospace;
  font-size:9px; letter-spacing:2px; color:var(--blue);
  text-transform:uppercase; margin-bottom:12px;
}
.cfg-row{
  display:flex; align-items:center; justify-content:space-between;
  padding:7px 0; gap:12px;
}
.cfg-label{
  font-size:13px; color:var(--text); flex:1;
}
.cfg-hint{
  font-family:'JetBrains Mono',monospace;
  font-size:9px; color:var(--muted); letter-spacing:0.5px;
  margin-top:1px;
}
/* toggle switch */
.tog{
  position:relative; width:40px; height:22px; flex-shrink:0;
}
.tog input{ opacity:0; width:0; height:0; position:absolute; }
.tog-track{
  position:absolute; inset:0;
  background:#2a2d35; border-radius:11px;
  cursor:pointer; transition:background 0.2s;
}
.tog input:checked ~ .tog-track{ background:rgba(59,130,246,0.7); }
.tog-thumb{
  position:absolute; top:3px; left:3px;
  width:16px; height:16px; border-radius:50%;
  background:var(--muted); transition:transform 0.2s, background 0.2s;
  pointer-events:none;
}
.tog input:checked ~ .tog-track .tog-thumb{
  transform:translateX(18px); background:#fff;
}
/* number input */
.cfg-num{
  width:70px; background:#0e1016;
  border:1px solid var(--line); border-radius:5px;
  color:var(--text); font-family:'JetBrains Mono',monospace;
  font-size:13px; padding:5px 8px; text-align:right;
  transition:border-color 0.15s;
}
.cfg-num:focus{ outline:none; border-color:rgba(59,130,246,0.5); }
/* select */
.cfg-select{
  background:#0e1016; border:1px solid var(--line);
  border-radius:5px; color:var(--text);
  font-family:'JetBrains Mono',monospace; font-size:11px;
  padding:5px 8px; transition:border-color 0.15s; min-width:160px;
}
.cfg-select:focus{ outline:none; border-color:rgba(59,130,246,0.5); }
/* footer bar */
.cfg-footer{
  padding:14px 20px; flex-shrink:0;
  border-top:1px solid var(--line);
  display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.cfg-status{
  font-family:'JetBrains Mono',monospace;
  font-size:10px; color:var(--muted); letter-spacing:0.5px; flex:1;
}
.cfg-status.ok{ color:var(--green); }
.cfg-status.err{ color:var(--red); }
.cfg-status.warn{ color:var(--gold); }
.cfg-save{
  background:rgba(59,130,246,0.15); border:1px solid rgba(59,130,246,0.35);
  color:var(--blue); border-radius:6px; padding:8px 20px;
  font-family:'JetBrains Mono',monospace; font-size:11px;
  font-weight:700; letter-spacing:1.5px; cursor:pointer;
  transition:background 0.15s, border-color 0.15s;
  white-space:nowrap;
}
.cfg-save:hover{ background:rgba(59,130,246,0.25); border-color:rgba(59,130,246,0.6); }
.cfg-save:disabled{ opacity:0.4; cursor:default; }
.cfg-log{
  background:transparent; border:1px solid rgba(255,255,255,0.12);
  color:var(--muted); border-radius:6px; padding:8px 14px;
  font-family:'JetBrains Mono',monospace; font-size:11px;
  font-weight:700; letter-spacing:1px; cursor:pointer;
  text-decoration:none; white-space:nowrap;
  transition:border-color 0.15s, color 0.15s;
}
.cfg-log:hover{ border-color:rgba(255,255,255,0.3); color:var(--text); }
.prev-crash-badge {
  color: #e8a020;
  font-weight: 600;
  letter-spacing: 0.02em;
  cursor: pointer;
  background: none;
  border: 1px solid rgba(232,160,32,0.4);
  border-radius: 4px;
  padding: 1px 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  transition: background 0.15s, border-color 0.15s;
}
.prev-crash-badge:hover {
  background: rgba(232,160,32,0.12);
  border-color: rgba(232,160,32,0.7);
}
.prev-crash-badge:active {
  background: rgba(232,160,32,0.22);
}

/* ── RESPONSIVE ── */

/* ── TABLET (641px–1024px) ── */
@media (min-width:641px) and (max-width:1024px){
  .content{ padding:12px 14px 32px; }
  .floor{ gap:8px; }
  th{ padding:5px 10px; font-size:10px; }
  td{ padding:7px 10px; font-size:13px; }
  .pick-open{ display:none; }
  .basket-bar{ display:none; }

  /* Tighten header */
  header{ padding:10px 16px; gap:10px; }
  .logo{ font-size:18px; letter-spacing:3px; }
  .payoff-hint{ display:none; }
  .sp-inline .n{ font-size:18px; }

  /* Meta bar: Period+Owner on line 1, Updated centered on line 2 */
  .hdr-meta{
    flex-wrap:wrap; gap:2px 16px;
    font-size:10px;
  }
  /* Updated: full width, centered. No color override — let .v children keep their color */
  .hdr-meta span:last-child{
    flex-basis:100%; text-align:center; font-size:9px;
  }
}

@media (max-width:640px){
  header{
    grid-template-columns:1fr auto;
    grid-template-rows:auto auto auto;
    gap:8px 12px; padding:10px 14px;
  }
  .logo{ grid-column:1; grid-row:1; font-size:18px; letter-spacing:3px; }
  .hdr-controls{ grid-column:2; grid-row:1; align-self:center; justify-self:end; }
  .gear-btn{ width:36px; height:36px; font-size:16px; }
  .chart-btn{ width:36px; height:36px; font-size:16px; }
  .hdr-meta{
    grid-column:1/-1; grid-row:2;
    flex-wrap:wrap; gap:6px 14px; font-size:9px;
  }
  .payoff-hero{
    grid-column:1; grid-row:3;
    text-align:left; border-right:none; padding:0;
  }
  .payoff-val{ font-size:22px; }
  .sp-inline{ grid-column:2; grid-row:3; text-align:right; }
  .sp-inline .n{ font-size:20px; }

  .content{ padding:8px 10px 32px; }
  .floor{ grid-template-columns:1fr; gap:8px; }
  th{ padding:4px 10px; font-size:10px; }
  td{ padding:6px 10px; font-size:13px; }
  .pick-open{ display:none; }
  .ticker-item{ padding:0 12px; font-size:11px; }
  footer{ padding:8px 14px; gap:12px; font-size:9px; }
}

@media (max-width:380px){
  .payoff-val, .sp-inline .n{ font-size:18px; }
  td{ font-size:12px; }
}

a.period-dl {
  color: var(--text);
  text-decoration: none;
  cursor: pointer;
}
a.period-dl.period-stale { color: var(--red); }

  </div>
</div>
<div class="content">
  <div class="floor" id="floor">
    <div class="loading">Loading market data…</div>
  </div>
</div>

<footer id="ftr"><span>kettle.local</span></footer>

<script>
// ── HELPERS ─────────────────────────────────────────────────
function fmt(v,d=2){ return v==null?'—':Number(v).toFixed(d); }
function fmtP(v){ return v==null?'—':(v>=0?'+':'')+Number(v).toFixed(2)+'%'; }
function fmtD(v){ return v==null?'—':(v>=0?'+$':'-$')+Math.abs(v); }
function pc(v){ return v==null?'':v>=0?'pos':'neg'; }
function rkCls(i){ return i===0?'g1':i===1?'g2':i===2?'g3':''; }

function bar(val,max){
  if(val==null||!max||isNaN(max)) return '<span class="sb"></span>';
  const p=Math.min(Math.abs(val)/max*100,100);
  return `<span class="sb"><span class="sbf ${val>=0?'pos':'neg'}" style="width:${p}%"></span></span>`;
}
function rk(i){ return `<td class="rk"><span class="${rkCls(i)}">${i+1}</span></td>`; }

// ── CARD BUILDERS ────────────────────────────────────────────
function card(title,sub,body){
  return `<div class="card"><div class="c-hdr-simple"><span class="c-title">${title}</span>${sub?`<span class="c-sub">${sub}</span>`:''}</div>${body}</div>`;
}

function buildTicker(d){
  const src=(d.ticker&&d.ticker.length)?d.ticker:[];
  if(!src.length) return;
  const items=src.map(e=>{
    const pct=e.daily_pct;
    const pctStr=pct!=null?`<span class="${pct>=0?'t-pos':'t-neg'}">${fmtP(pct)}</span>`:'';
    return `<span class="ticker-item"><span style="font-weight:600">${e.sym}</span> ${fmt(e.price)} ${pctStr}<span class="ticker-sep"> | </span></span>`;
  }).join('');
  document.getElementById('ticker').innerHTML=items+items;
}

function lbTable(d){
  const mx=Math.max(...d.leaderboard.map(e=>Math.abs(e.basket_pct)));
  const rows=d.leaderboard.map((e,i)=>`
    <tr class="${e.is_owner?'me':''}">
      ${rk(i)}
      <td class="${e.is_owner?'hi':''}">${ownerName(e.nickname, e.is_owner)}</td>
      <td class="r gold">${e.points}</td>
      <td class="r"><span class="sbar"><span class="${pc(e.basket_pct)}">${fmt(e.basket_pct)}%</span>${bar(e.basket_pct,mx)}</span></td>
    </tr>`).join('');
  return `<table><tr><th>#</th><th>Member</th><th class="r">Pts</th><th class="r">Basket</th></tr>${rows}</table>`;
}

function betTable(d){
  const sorted=[...d.bet_summary].sort((a,b)=>b.total-a.total);
  const rows=sorted.map((e,i)=>`
    <tr class="${e.is_owner?'me':''}">
      ${rk(i)}
      <td class="${e.is_owner?'hi':''}">${ownerName(e.nickname, e.is_owner)}</td>
      <td class="r ${e.bets>=0?'pos':'neg'}">${fmtD(e.bets)}</td>
      <td class="r ${e.fines!==0?'neg':'dim'}">${e.fines!==0?fmtD(e.fines):'—'}</td>
      <td class="r ${pc(e.total)}">${fmtD(e.total)}</td>
    </tr>`).join('');
  return `<table><tr><th>#</th><th>Member</th><th class="r">Bets</th><th class="r">Fines</th><th class="r">Net</th></tr>${rows}</table>`;
}

function buildLB(d){
  return `<div class="card">
    <div class="c-hdr">
      <div class="c-tabs">
        <span class="c-tab active" id="tab-lb"   onclick="lbSwitch('lb'  )">Leaderboard</span>
        <span class="c-tab-sep">|</span>
        <span class="c-tab"        id="tab-bets" onclick="lbSwitch('bets')">Bet Summary</span>
      </div>
      <span class="c-sub" id="tab-sub">${d.meta.period}</span>
    </div>
    <div id="lb-body">${lbTable(d)}</div>
  </div>`;
}

let g_lbData = null;
let g_lbTab  = 'lb';   // persists across refreshes

function lbSwitch(tab){
  if(!g_lbData) return;
  g_lbTab = tab;
  const isLB = tab === 'lb';
  document.getElementById('tab-lb'  ).className = 'c-tab' + (isLB  ? ' active' : '');
  document.getElementById('tab-bets').className = 'c-tab' + (!isLB ? ' active' : '');
  document.getElementById('tab-sub' ).textContent = isLB ? g_lbData.meta.period : 'sorted by net';
  document.getElementById('lb-body' ).innerHTML   = isLB ? lbTable(g_lbData) : betTable(g_lbData);
}

function lbRefresh(){
  // Called on data refresh — updates data silently, only re-renders if currently showing LB
  // If member is viewing Bet Summary, leave it alone; they'll see fresh data on next tab click
  const isLB = g_lbTab === 'lb';
  document.getElementById('tab-lb'  ).className = 'c-tab' + (isLB  ? ' active' : '');
  document.getElementById('tab-bets').className = 'c-tab' + (!isLB ? ' active' : '');
  document.getElementById('tab-sub' ).textContent = isLB ? g_lbData.meta.period : 'sorted by net';
  if(isLB) document.getElementById('lb-body').innerHTML = lbTable(g_lbData);
}

function buildSPP(d){
  const rows=d.sp_pred.map((e,i)=>`
    <tr class="${e.is_owner?'me':''}">
      ${rk(i)}
      <td class="${e.is_owner?'hi':''}">${ownerName(e.nickname, e.is_owner)}</td>
      <td class="r">${fmt(e.prediction,0)}</td>
      <td class="r dim">${fmt(e.pct_off)}%</td>
    </tr>`).join('');
  return card('S&amp;P Prediction','',
    `<table><tr><th>#</th><th>Member</th><th class="r">Target</th><th class="r">% Off</th></tr>${rows}</table>`);
}

function cfToggle(el){
  const locked = el.dataset.locked;
  const live   = el.dataset.live;
  const showing = el.dataset.showing || 'locked';
  if(showing === 'locked'){
    el.textContent = live + ' ↺';
    el.dataset.showing = 'live';
    el.classList.add('cf-active');
  } else {
    el.textContent = locked;
    el.dataset.showing = 'locked';
    el.classList.remove('cf-active');
  }
}

function buildPick(title,arr){
  const rows=arr.map((e,i)=>{
    // For locked lock entries with a live price, make the gain cell tappable
    const hasCf = e.locked && e.live_price != null && e.open != null && e.open > 0;
    const cfPct = hasCf ? ((e.live_price - e.open) / e.open * 100) : null;
    const gainCell = hasCf
      ? `<td class="r ${pc(e.pct_gain)}">
           <span class="cf-tap"
             data-locked="${fmtP(e.pct_gain)}"
             data-live="${fmtP(cfPct)}"
             title="Tap to see unlocked gain"
             onclick="cfToggle(this)">
             ${fmtP(e.pct_gain)}
           </span>
         </td>`
      : `<td class="r ${pc(e.pct_gain)}">${fmtP(e.pct_gain)}</td>`;
    return `
    <tr class="${e.is_owner?'me':''}">
      ${rk(i)}
      <td class="${e.is_owner?'hi':''}">${ownerName(e.nickname, e.is_owner)}</td>
      <td><a class="sym-link" href="https://finance.yahoo.com/quote/${e.ticker}" target="_blank" rel="noopener">${e.ticker}</a>${e.locked?'<span class="lk">LK</span>':''}${e.split_applied?'<span class="sp-badge">SP</span>':''}</td>
      <td class="r dim pick-open">${fmt(e.open)}</td>
      <td class="r">${fmt(e.price)}</td>
      ${gainCell}
    </tr>`;
  }).join('');
  return card(title,'',
    `<table><tr><th>#</th><th>Member</th><th>Ticker</th><th class="r pick-open">Open</th><th class="r">Price</th><th class="r">Gain</th></tr>${rows}</table>`);
}

function buildBasket(d){
  const mx=Math.max(...d.basket.map(e=>Math.abs(e.pct_gain)));
  const rows=d.basket.map((e,i)=>`
    <tr class="${e.is_owner?'me':''}">
      ${rk(i)}
      <td class="${e.is_owner?'hi':''}">${ownerName(e.nickname, e.is_owner)}</td>
      <td class="dim">${e.tickers.split('/').map(s=>`<a class="sym-link" href="https://finance.yahoo.com/quote/${s}" target="_blank" rel="noopener">${s}</a>`).join('<span class="sym-sep">/</span>')}</td>
      <td class="r"><span class="sbar"><span class="${pc(e.pct_gain)}">${fmtP(e.pct_gain)}</span><span class="basket-bar">${bar(e.pct_gain,mx)}</span></span></td>
    </tr>`).join('');
  return card('Basket','3-stock average',
    `<table><tr><th>#</th><th>Member</th><th>Picks</th><th class="r">Avg Gain</th></tr>${rows}</table>`);
}

// ── MODAL ────────────────────────────────────────────────────
let g_data = null;

function openModal(){
  if(!g_data) return;
  const p=g_data.payoff;
  const m=g_data.meta;
  document.getElementById('modal-net').textContent=fmtD(p.total);
  document.getElementById('modal-net').className='modal-net-val '+pc(p.total);
  document.getElementById('modal-items').innerHTML=
    (p.items||[]).map(i=>`<tr><td>${i.label}</td><td class="r ${i.amount>=0?'pos':'neg'}">${fmtD(i.amount)}</td></tr>`).join('');
  document.getElementById('modal-backdrop').classList.add('open');
}

function closeModal(e){
  if(e&&e.target!==document.getElementById('modal-backdrop')) return;
  document.getElementById('modal-backdrop').classList.remove('open');
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') document.getElementById('modal-backdrop').classList.remove('open');
});

// ── MEMBER CARD ─────────────────────────────────────────────

function openMemberCard(){
  if(!g_data) return;
  const d = g_data;
  const m = d.meta;

  document.getElementById('mc-name').textContent   = m.owner_nick;

  // Find owner's rank + value in each category
  // Returns {rank, val, valStr, max} where max is for bar scaling per-category
  function ownerEntry(arr, valKey){
    const idx = arr.findIndex(e => e.is_owner);
    if(idx < 0) return null;
    const val = arr[idx][valKey];
    const max = Math.max(...arr.map(e => Math.abs(e[valKey] ?? 0)));
    return { rank: idx + 1, val, max };
  }

  const cats = [
    { label:'Leaderboard', entry: ownerEntry(d.leaderboard, 'points'),
      fmtVal: v => v + ' pts', noBar: false, fixedMax: 35 },
    { label:'Gainer',      entry: ownerEntry(d.gainer,      'pct_gain'),
      fmtVal: v => fmtP(v) },
    { label:'Loser',       entry: ownerEntry(d.loser,       'pct_gain'),
      fmtVal: v => fmtP(v) },
    { label:'Lock',        entry: ownerEntry(d.lock,        'pct_gain'),
      fmtVal: v => fmtP(v) },
    { label:'Basket',      entry: ownerEntry(d.basket,      'pct_gain'),
      fmtVal: v => fmtP(v) },
  ];

  const rankCls = r => r===1?'g1':r===2?'g2':r===3?'g3':'g4';

  const rows = cats.map(c => {
    if(!c.entry) return '';
    const { rank, val, max } = c.entry;
    const scaleMax = c.fixedMax !== undefined ? c.fixedMax : max;
    const pct   = (scaleMax > 0) ? Math.min(Math.abs(val) / scaleMax * 100, 100) : 0;
    const sign  = val >= 0 ? 'pos' : 'neg';
    const barCls = c.fixedMax !== undefined ? 'pos' : sign;  // points bar always green
    const vStr  = c.fmtVal(val);
    const barHtml = c.noBar
      ? `<span class="mc-sb"></span>`
      : `<span class="mc-sb"><span class="mc-sbf ${barCls}" style="width:${pct}%"></span></span>`;
    return `<div class="mc-row">
      <span class="mc-cat">${c.label}</span>
      <span class="mc-rank ${rankCls(rank)}">#${rank}</span>
      <div class="mc-bar-wrap">
        ${barHtml}
      </div>
      <span class="mc-val ${c.noBar ? 'gold' : sign}">${vStr}</span>
    </div>`;
  }).join('');

  document.getElementById('mc-rows').innerHTML = rows;
  document.getElementById('mc-backdrop').classList.add('open');
}

function closeMemberCard(e){
  if(e && e.target !== document.getElementById('mc-backdrop')) return;
  document.getElementById('mc-backdrop').classList.remove('open');
}
document.addEventListener('keydown', e => {
  if(e.key === 'Escape') document.getElementById('mc-backdrop').classList.remove('open');
});

// Wrap an owner name in a clickable span
function ownerName(nickname, isOwner){
  if(!isOwner) return nickname;
  return `<span class="owner-name" onclick="openMemberCard()">${nickname}</span>`;
}

// ── SETTINGS ─────────────────────────────────────────────────
let g_cfgData = null;

function openSettings(){
  document.getElementById('cfg-backdrop').classList.add('open');
  document.getElementById('cfg-status').textContent = '';
  document.getElementById('cfg-status').className = 'cfg-status';
  document.getElementById('cfg-body').innerHTML = '<div class="loading">Loading…</div>';
  fetch('/api/config')
    .then(r => r.json())
    .then(d => { g_cfgData = d; renderSettings(d); })
    .catch(() => {
      document.getElementById('cfg-body').innerHTML =
        '<div class="loading">Failed to load settings.</div>';
    });
}

function closeCfg(e){
  if(e && e.target !== document.getElementById('cfg-backdrop')) return;
  document.getElementById('cfg-backdrop').classList.remove('open');
}
document.addEventListener('keydown', e => {
  if(e.key === 'Escape') document.getElementById('cfg-backdrop').classList.remove('open');
});

function tog(id, checked){
  return `<label class="tog">
    <input type="checkbox" id="${id}" ${checked?'checked':''}>
    <span class="tog-track"><span class="tog-thumb"></span></span>
  </label>`;
}
function numInput(id, val, min, max, step){
  return `<input class="cfg-num" type="number" id="${id}"
    value="${val}" min="${min}" max="${max}" step="${step||1}">`;
}

function renderSettings(d){
  const n = d.notifications;
  const ldc = n.lock_daily_change;
  const tzOpts = (d.supported_timezones||[])
    .map(z => `<option value="${z}" ${z===d.timezone?'selected':''}>${z}</option>`)
    .join('');

  document.getElementById('cfg-body').innerHTML = `
    <div class="cfg-section">
      <div class="cfg-section-title">General</div>
      <div class="cfg-row">
        <div><div class="cfg-label">Mute audio</div></div>
        ${tog('cfg-muted', d.muted)}
      </div>
      <div class="cfg-row">
        <div>
          <div class="cfg-label">Display sleep</div>
          <div class="cfg-hint">seconds after close before backlight off</div>
        </div>
        ${numInput('cfg-sleep-timeout', d.display_sleep_timeout_sec, 30, 3600, 30)}
      </div>
      <div class="cfg-row">
        <div><div class="cfg-label">Timezone</div></div>
        <select class="cfg-select" id="cfg-tz">${tzOpts}</select>
      </div>
    </div>

    <div class="cfg-section">
      <div class="cfg-section-title">Display Rotation</div>
      <div class="cfg-row">
        <div><div class="cfg-label">Auto-rotate</div></div>
        ${tog('cfg-rot-enabled', d.rotation.enabled)}
      </div>
      <div class="cfg-row">
        <div>
          <div class="cfg-label">Grid dwell</div>
          <div class="cfg-hint">seconds on summary grid</div>
        </div>
        ${numInput('cfg-grid-delay', d.rotation.grid_delay, 10, 300)}
      </div>
      <div class="cfg-row">
        <div>
          <div class="cfg-label">View dwell</div>
          <div class="cfg-hint">seconds on each category</div>

          <div class="cfg-hint">${d.pushover_configured ? 'configured' : 'not configured'}</div>
        </div>

      <div class="cfg-row">

        ${tog('cfg-n-wifi', n.wifi_connect)}
      </div>
      <div class="cfg-row">
        <div><div class="cfg-label">New lock declared</div></div>
        ${tog('cfg-n-lock', n.new_lock)}
      </div>
      <div class="cfg-row">
        <div><div class="cfg-label">Midday standings</div></div>
        ${tog('cfg-n-midday', n.midday_update)}
      </div>
      <div class="cfg-row">
        <div><div class="cfg-label">After-hours standings</div></div>
        ${tog('cfg-n-afterhours', n.after_hours_update)}
      </div>

        ${tog('cfg-n-eod', n.eod_stats)}

    <div class="cfg-section">
      <div class="cfg-section-title">Lock Change Alerts</div>

        ${numInput('cfg-ldc-daily', ldc.daily_threshold, 0, 100, 0.5)}
      </div>
      <div class="cfg-row">
        <div>
          <div class="cfg-label">Total move threshold</div>

}

function collectSettings(){
  const get = id => document.getElementById(id);
  return {
    timezone:  get('cfg-tz').value,
    muted:     get('cfg-muted').checked,
    display_sleep_timeout_sec: parseInt(get('cfg-sleep-timeout').value, 10),
    rotation: {
      enabled:    get('cfg-rot-enabled').checked,
      grid_delay: parseInt(get('cfg-grid-delay').value, 10),
      view_delay: parseInt(get('cfg-view-delay').value, 10),
    },
    notifications: {
      wifi_connect:       get('cfg-n-wifi').checked,
      new_lock:           get('cfg-n-lock').checked,
      midday_update:      get('cfg-n-midday').checked,
      after_hours_update: get('cfg-n-afterhours').checked,
      eod_stats:          get('cfg-n-eod').checked,
      lock_daily_change: {
        send:            get('cfg-ldc-send').checked,
        daily_threshold: parseFloat(get('cfg-ldc-daily').value),
        total_threshold: parseFloat(get('cfg-ldc-total').value),
      }
    }
  };
}

async function saveSettings(){
  const btn    = document.getElementById('cfg-save');
  const status = document.getElementById('cfg-status');
  btn.disabled = true;
  status.textContent = 'Saving…';
  status.className = 'cfg-status';
  try {
    const r = await fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(collectSettings())
    });
    const j = await r.json();
    if(j.ok){
      if(j.reboot_required){
        // Timezone change — stay open, show amber warning
        status.textContent = 'Timezone changed — reboot Kettle to apply.';
        status.className = 'cfg-status warn';
      } else {
        // Normal save — show confirmation then auto-dismiss after 2 seconds
        status.textContent = 'Saved.';
        status.className = 'cfg-status ok';
        setTimeout(() => {
          document.getElementById('cfg-backdrop').classList.remove('open');
        }, 2000);
      }
    } else {
      status.textContent = j.error || 'Save failed.';
      status.className = 'cfg-status err';
    }
  } catch {
    status.textContent = 'Network error.';
    status.className = 'cfg-status err';
  }
  btn.disabled = false;
}

// ── RENDER ───────────────────────────────────────────────────
function render(data,status){
  const firstRender = !g_lbData;
  g_data   = data;
  g_lbData = data;
  const m=data.meta;

  buildTicker(data);

  const hPeriod=document.getElementById('h-period');
  hPeriod.textContent=m.period;
  hPeriod.classList.toggle('period-stale', !!(status&&status.stale));
  document.getElementById('h-owner').textContent=m.owner_nick;
  document.getElementById('h-updated').textContent=(m.updated||'').replace('T',' ');

  const sp=data.sp_index;
  const sc=sp.change_pct>=0?'pos':'neg';
  document.getElementById('sp-n').textContent=fmt(sp.current);
  document.getElementById('sp-c').innerHTML=`<span class="${sc}">${fmtP(sp.change_pct)} &nbsp; ${sp.change>=0?'+':''}${fmt(sp.change)}</span>`;

  const open=status&&status.market_open;
  const mkt=document.getElementById('mkt');
  mkt.textContent=open?'OPEN':'○ CLOSED';
  mkt.className='mkt '+(open?'open':'closed');

  const pv=document.getElementById('payoff-val');
  pv.textContent=fmtD(data.payoff.total);
  pv.className='payoff-val '+pc(data.payoff.total);

  // 3×2 grid: LB | SPP / Gainer | Loser / Lock | Basket
  if(firstRender){
    document.getElementById('floor').innerHTML=
      buildLB(data)+buildSPP(data)+
      buildPick('Gainer',data.gainer)+buildPick('Loser',data.loser)+
      buildPick('Lock',data.lock)+buildBasket(data);
  } else {
    // Preserve tab state — only update LB body if member is on leaderboard view
    lbRefresh();
    // Re-render the other 5 cards; snapshot to array first to avoid live NodeList issues
    const cards = Array.from(document.getElementById('floor').children);
    const next = [null, buildSPP(data), buildPick('Gainer',data.gainer),
                  buildPick('Loser',data.loser), buildPick('Lock',data.lock), buildBasket(data)];
    for(let i=1; i<6; i++){
      const tmp = document.createElement('div');
      tmp.innerHTML = next[i];
      cards[i].replaceWith(tmp.firstElementChild);
    }
  }

  if(status){
    const heap=Math.round(status.free_heap/1024)+'KB';
    const up=Math.floor(status.uptime_s/3600)+'h'+String(Math.floor((status.uptime_s%3600)/60)).padStart(2,'0')+'m';
    document.getElementById('ftr').innerHTML =
      `<span><b>kettle.local</b></span><span><b>v</b>${status.version}</span><span><b>id</b> ${status.device_id}</span><span><b>up</b> ${up}</span><span><b>heap</b> ${heap}</span><span><b>rssi</b> ${status.wifi_rssi}dBm</span>` +
      (status.battery_present ? `<span><b>batt</b> ${status.battery_pct}%</span>` : '') +
      (status.prev_crash_reason ? `<button class="prev-crash-badge" onclick="downloadDiagBundle()" title="Prev crash: ${{3:'PANIC',7:'INT_WDT',8:'TASK_WDT'}[status.prev_crash_reason]||'reason '+status.prev_crash_reason} — click to download diagnostics">⚠ DIAG</button>` : '');
  }
}

// ── FETCH ────────────────────────────────────────────────────
function showError(){
  document.getElementById('ticker').innerHTML='';
  const hPeriodErr=document.getElementById('h-period');
  hPeriodErr.textContent='—';
  hPeriodErr.classList.remove('period-stale');
  document.getElementById('h-owner').textContent='—';
  document.getElementById('h-updated').textContent='—';
  document.getElementById('sp-n').textContent='——';
  document.getElementById('sp-c').innerHTML='';
  document.getElementById('payoff-val').textContent='——';
  document.getElementById('payoff-val').className='payoff-val';
  const mkt=document.getElementById('mkt');
  mkt.textContent='○ CLOSED'; mkt.className='mkt closed';
  document.getElementById('floor').innerHTML=
    '<div class="loading">Waiting for data\u2026</div>';
  g_lbData=null; g_lbTab='lb';
}

let g_pollTimer = null;
let g_wasMarketOpen = null;
const POLL_MARKET_OPEN_MS   = 60000;   // 60s when market is open
const POLL_MARKET_CLOSED_MS = 300000;  // 5min when market is closed

function schedulePoll(marketOpen) {
  // If market just transitioned to open, refresh immediately and switch to fast polling
  if (g_wasMarketOpen === false && marketOpen === true) {
    g_wasMarketOpen = true;
    refresh();
    return;
  }
  g_wasMarketOpen = marketOpen;
  if (g_pollTimer) clearTimeout(g_pollTimer);
  g_pollTimer = setTimeout(() => refresh(),
    marketOpen ? POLL_MARKET_OPEN_MS : POLL_MARKET_CLOSED_MS);
}

async function refresh(){
  try{
    const[dr,sr]=await Promise.all([fetch('/data.json'),fetch('/status.json')]);
    if(!dr.ok) throw 0;
    const status = sr.ok ? await sr.json() : null;
    render(await dr.json(), status);
    schedulePoll(status && status.market_open);
  }catch{
    showError();
    schedulePoll(false); // on error, back off to slow poll
  }
}
refresh();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
// ── DIAGNOSTIC BUNDLE DOWNLOAD ───────────────────────────────────────────────
// Fetches current log, previous log, and core dump (if present) from Kettle,
// packages them into a ZIP, and triggers a browser download.
async function downloadDiagBundle() {
  const btn = document.querySelector('.prev-crash-badge');
  if (btn) { btn.textContent = '⏳ …'; btn.disabled = true; }

  try {
    const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    const zip = new JSZip();
    const folder = zip.folder('kettle-diag-' + ts);

    // Fetch all three sources in parallel; coredump is optional (404 is fine).
    const [curRes, prevRes, dumpRes, statusRes] = await Promise.all([
      fetch('/log'),
      fetch('/log/prev'),
      fetch('/api/coredump').catch(() => null),
      fetch('/status.json').catch(() => null),
    ]);

    if (curRes.ok) {
      folder.file('session.log', await curRes.text());
    }
    if (prevRes.ok) {
      folder.file('session-prev.log', await prevRes.text());
    }
    if (dumpRes && dumpRes.ok) {
      // Content-Disposition carries the original filename (e.g. CORE_12345.raw)
      const cd = dumpRes.headers.get('Content-Disposition') || '';
      const match = cd.match(/filename="?([^";\r\n]+)"?/);
      const dumpName = match ? match[1] : 'coredump.raw';
      folder.file(dumpName, await dumpRes.arrayBuffer());
    }

    // manifest.txt — records version and device so the correct ELF can be
    // retrieved from the GitHub release when decoding the core dump.
    let manifest = `Kettle Diagnostic Bundle\n`;
    manifest    += `Captured: ${new Date().toISOString()}\n`;
    if (statusRes && statusRes.ok) {
      const st = await statusRes.json();
      manifest += `Version:   ${st.version || 'unknown'}\n`;
      manifest += `Device ID: ${st.device_id || 'unknown'}\n`;
      manifest += `Uptime:    ${st.uptime_s || 0}s\n`;
    }
    manifest += `\nTo decode the core dump:\n`;
    manifest += `  1. Download the matching ELF from the GitHub release for the version above.\n`;
    manifest += `  2. Run: esp-coredump info_corefile -t raw -c <dump>.raw <version>.elf --gdb <path-to-gdb>\n`;
    folder.file('manifest.txt', manifest);

    const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'kettle-diag-' + ts + '.zip';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    if (btn) { btn.textContent = '⚠ DIAG'; btn.disabled = false; }
  } catch (e) {
    console.error('Diag bundle error:', e);
    if (btn) { btn.textContent = '⚠ DIAG'; btn.disabled = false; }
    alert('Diagnostic download failed. Check the browser console for details.');
  }
}
</script>
